<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaTracker · Watched Library</title>
    <link rel="preload" href="/styles.css" as="style" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Watched films</p>
            <h2>Tracked and reviewed Z</h2>
          </div>
          <div class="controls">
            <label class="control">
              <span>Category</span>
              <select id="categoryFilter">
                <option value="all">All</option>
              </select>
            </label>
            <label class="control">
              <span>Sort by</span>
              <select id="sortSelect">
                <option value="watchedDate">Date watched</option>
                <option value="releaseDate">Release date</option>
                <option value="category">Category</option>
              </select>
            </label>
          </div>
        </header>

        <section class="list-header">
          <p id="resultsCount">Loading your watched titles…</p>
        </section>

        <section id="movieList" class="movie-list" aria-live="polite"></section>
      </main>
    </div>

    <div id="ratingsPanel" class="ratings-panel" aria-live="polite">
      <div class="panel-header">
        <h3>Ratings</h3>
        <button id="closeRatings" type="button">×</button>
      </div>
      <div id="ratingsContent" class="ratings-content">
        <p>Select a title to view its source ratings.</p>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
